<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Período 2: MDC, MMC e Estatística</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .progress-section {
            margin-bottom: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 13px;
            color: #666;
            margin-top: 8px;
        }

        .question-container {
            display: none;
        }

        .question-container.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .difficulty-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .difficulty-badge.easy {
            background: #d4edda;
            color: #155724;
        }

        .difficulty-badge.medium {
            background: #fff3cd;
            color: #856404;
        }

        .difficulty-badge.hard {
            background: #f8d7da;
            color: #721c24;
        }

        .question-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
            font-weight: 500;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #f9f9f9;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #e8ecff;
        }

        .option.correct {
            border-color: #28a745;
            background: #d4edda;
        }

        .option.incorrect {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .option-letter {
            display: inline-block;
            width: 30px;
            height: 30px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .option.selected .option-letter {
            background: #764ba2;
        }

        .option.correct .option-letter {
            background: #28a745;
        }

        .option.incorrect .option-letter {
            background: #dc3545;
        }

        .option-text {
            flex: 1;
            color: #333;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px;
            background: #e8f4f8;
            border-left: 4px solid #667eea;
            border-radius: 5px;
            display: none;
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }

        .explanation.show {
            display: block;
        }

        .explanation strong {
            color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            font-size: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-next {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            min-width: 120px;
        }

        .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-next:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .results-container {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .results-container.active {
            display: block;
        }

        .results-container h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .results-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            padding: 20px;
            border-radius: 10px;
            background: #f9f9f9;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
        }

        .stat-box.correct {
            background: #d4edda;
            color: #155724;
        }

        .stat-box.incorrect {
            background: #f8d7da;
            color: #721c24;
        }

        .stat-box.percentage {
            background: #d1ecf1;
            color: #0c5460;
        }

        .btn-restart {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 14px 30px;
            font-size: 15px;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 20px;
            }

            .results-stats {
                grid-template-columns: 1fr;
            }

            .stat-value {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Quiz - Período 2: MDC, MMC e Estatística</h1>
            <p>Resolva cada questão e selecione a alternativa correta</p>
        </div>

        <div class="progress-section">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text">
                Pergunta <span id="currentQuestion">1</span> de <span id="totalQuestions">24</span>
            </div>
        </div>

        <div id="quizContainer">
            <!-- Questions will be inserted here -->
        </div>

        <div class="results-container" id="resultsContainer">
            <h2>🎉 Quiz Finalizado!</h2>
            <div class="results-stats">
                <div class="stat-box correct">
                    <div class="stat-label">Acertos</div>
                    <div class="stat-value" id="correctCount">0</div>
                </div>
                <div class="stat-box incorrect">
                    <div class="stat-label">Erros</div>
                    <div class="stat-value" id="wrongCount">0</div>
                </div>
                <div class="stat-box percentage">
                    <div class="stat-label">Aproveitamento</div>
                    <div class="stat-value" id="percentage">0%</div>
                </div>
            </div>
            <button class="btn btn-restart" onclick="location.reload()">Fazer Quiz Novamente</button>
        </div>

        <div class="button-group" id="buttonGroup">
            <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()" disabled>Próxima</button>
        </div>
    </div>

    <script>
        const questions = [
            // === FÁCIL (8 questões) ===
            {
                id: 1,
                difficulty: 'easy',
                question: 'Qual é o maior divisor comum (MDC) de 12 e 18?',
                options: [
                    { text: '9', correct: false, explanation: '9 divide 18, mas não divide 12. Não pode ser o MDC. O MDC(12, 18) = 6.' },
                    { text: '12', correct: false, explanation: '12 divide 12, mas não divide 18. Portanto, não pode ser o MDC. O MDC(12, 18) = 6.' },
                    { text: '3', correct: false, explanation: 'O número 3 é um divisor comum, mas não é o maior. O MDC(12, 18) = 6, pois 6 é maior que 3 e divide ambos os números.' },
                    { text: '6', correct: true, explanation: 'Os divisores de 12 são: 1, 2, 3, 4, 6, 12. Os divisores de 18 são: 1, 2, 3, 6, 9, 18. O maior divisor em comum é 6. O MDC(12, 18) = 6.' }
                ]
            },
            {
                id: 2,
                difficulty: 'easy',
                question: 'Qual é o menor múltiplo comum (MMC) de 4 e 6?',
                options: [
                    { text: '12', correct: true, explanation: 'Os múltiplos de 4 são: 4, 8, 12, 16, 20... Os múltiplos de 6 são: 6, 12, 18, 24... O menor múltiplo em comum é 12. O MMC(4, 6) = 12.' },
                    { text: '2', correct: false, explanation: '2 é um divisor comum, não um múltiplo comum. O MMC(4, 6) = 12, pois é o menor número que é múltiplo de ambos.' },
                    { text: '24', correct: false, explanation: '24 é sim múltiplo de ambos, mas não é o menor. O MMC(4, 6) = 12, que é menor que 24.' },
                    { text: '6', correct: false, explanation: '6 é múltiplo de 6, mas não é múltiplo de 4. O MMC(4, 6) = 12.' }
                ]
            },
            {
                id: 3,
                difficulty: 'easy',
                question: 'Quais são TODOS os divisores de 20?',
                options: [
                    { text: '1, 2, 4, 5, 10, 20', correct: true, explanation: '20 ÷ 1 = 20, 20 ÷ 2 = 10, 20 ÷ 4 = 5, 20 ÷ 5 = 4, 20 ÷ 10 = 2, 20 ÷ 20 = 1. Todos dividem 20 sem deixar resto.' },
                    { text: '2, 4, 10, 20', correct: false, explanation: 'Faltam os divisores 1 e 5. Os divisores completos de 20 são: 1, 2, 4, 5, 10, 20.' },
                    { text: '1, 20', correct: false, explanation: 'Faltam vários divisores. Os divisores completos de 20 são: 1, 2, 4, 5, 10, 20.' },
                    { text: '1, 2, 5, 10', correct: false, explanation: 'Faltam os divisores 4 e 20. Os divisores completos de 20 são: 1, 2, 4, 5, 10, 20.' }
                ]
            },
            {
                id: 4,
                difficulty: 'easy',
                question: 'O número 17 é primo ou composto?',
                options: [
                    { text: 'Primo', correct: true, explanation: 'O número 17 é primo porque seus únicos divisores são 1 e 17. Ele não pode ser dividido por nenhum outro número natural.' },
                    { text: 'Nem primo nem composto', correct: false, explanation: '17 é classificado como número primo. Um número é primo se tem exatamente dois divisores: 1 e ele mesmo.' },
                    { text: 'Composto', correct: false, explanation: 'Um número composto deve ter divisores diferentes de 1 e dele mesmo. 17 é primo porque só é divisível por 1 e 17.' },
                    { text: 'Composto com fatores 1 e 17 apenas', correct: false, explanation: 'Um número primo só pode ser divisível por 1 e por ele mesmo. Se esses são os únicos fatores, o número é primo, não composto. 17 é primo.' }
                ]
            },
            {
                id: 5,
                difficulty: 'easy',
                question: 'Calcule a média aritmética de: 10, 20, 30',
                options: [
                    { text: '30', correct: false, explanation: 'O resultado da soma é 60, e dividindo por 3 obtemos 20, não 30. A média correta é 20.' },
                    { text: '25', correct: false, explanation: 'A média é calculada dividindo a soma de todos os valores pela quantidade. (10 + 20 + 30) ÷ 3 = 20.' },
                    { text: '15', correct: false, explanation: 'A média aritmética é (10 + 20 + 30) ÷ 3 = 60 ÷ 3 = 20, não 15.' },
                    { text: '20', correct: true, explanation: 'Média = (10 + 20 + 30) ÷ 3 = 60 ÷ 3 = 20. Somamos todos os valores e dividimos pela quantidade de valores.' }
                ]
            },
            {
                id: 6,
                difficulty: 'easy',
                question: 'Qual é a amplitude do conjunto: 5, 8, 12, 15, 3?',
                options: [
                    { text: '8.6', correct: false, explanation: 'Este seria próximo da média, não da amplitude. A amplitude é 15 - 3 = 12.' },
                    { text: '5', correct: false, explanation: 'A amplitude não é a quantidade de números no conjunto. É a diferença entre o maior (15) e o menor (3): 15 - 3 = 12.' },
                    { text: '12', correct: true, explanation: 'A amplitude é a diferença entre o maior e o menor valor. Maior: 15, Menor: 3. Amplitude = 15 - 3 = 12.' },
                    { text: '10', correct: false, explanation: 'A amplitude é calculada subtraindo o menor valor do maior. 15 - 3 = 12, não 10.' }
                ]
            },
            {
                id: 7,
                difficulty: 'easy',
                question: 'Em um gráfico de pizza, 25% dos dados correspondem a quantos graus?',
                options: [
                    { text: '180°', correct: false, explanation: '180° corresponde a 50% dos dados. Para 25%, precisamos de 90°: (25 ÷ 100) × 360° = 90°.' },
                    { text: '90°', correct: true, explanation: '360° representa 100%. Para 25%, calculamos: (25 ÷ 100) × 360° = 0,25 × 360° = 90°.' },
                    { text: '45°', correct: false, explanation: '45° corresponde a 12,5% dos dados. Para 25%, precisamos de 90°: (25 ÷ 100) × 360° = 90°.' },
                    { text: '120°', correct: false, explanation: '120° corresponde a 33,3% dos dados. Para 25%, calculamos: (25 ÷ 100) × 360° = 90°.' }
                ]
            },
            {
                id: 8,
                difficulty: 'easy',
                question: 'Qual é a diferença entre pesquisa censitária e pesquisa por amostra?',
                options: [
                    { text: 'Censitária é mais rápida que amostra', correct: false, explanation: 'Geralmente é o contrário. A pesquisa censitária leva mais tempo por investigar todos. Amostra é mais rápida. A diferença real é que censitária estuda toda a população.' },
                    { text: 'Não há diferença, são sinônimos', correct: false, explanation: 'Existem diferenças importantes. Censitária investiga toda a população (100%), enquanto amostra investiga apenas uma parte representativa.' },
                    { text: 'Censitária investiga toda a população; amostra investiga parte da população', correct: true, explanation: 'A pesquisa censitária coleta dados de TODA a população (100%), enquanto a pesquisa por amostra coleta dados de uma PARTE representativa da população.' },
                    { text: 'Amostra é sempre mais precisa', correct: false, explanation: 'Ambas podem ser precisas dependendo do método. A diferença é que censitária estuda toda a população, enquanto amostra estuda apenas uma parte.' }
                ]
            },

            // === MÉDIO (8 questões) ===
            {
                id: 9,
                difficulty: 'medium',
                question: 'Determine o MDC de 24 e 36 usando decomposição simultânea.',
                options: [
                    { text: '8', correct: false, explanation: 'Na decomposição simultânea correta: 24, 36 ÷ 2 → 12, 18 ÷ 2 → 6, 9 ÷ 3 → 2, 3. O MDC é 2 × 2 × 3 = 12.' },
                    { text: '36', correct: false, explanation: '36 é um dos números, não o MDC. Na decomposição: 24, 36 ÷ 2 → 12, 18 ÷ 2 → 6, 9 ÷ 3 → 2, 3. MDC = 2 × 2 × 3 = 12.' },
                    { text: '6', correct: false, explanation: 'Na decomposição simultânea: 24, 36 ÷ 2 → 12, 18 ÷ 2 → 6, 9 ÷ 3 → 2, 3. Multiplicando os divisores comuns: 2 × 2 × 3 = 12.' },
                    { text: '12', correct: true, explanation: 'Decomposição simultânea: 24, 36 ÷ 2 → 12, 18 ÷ 2 → 6, 9 ÷ 3 → 2, 3 (não há divisor comum). MDC = 2 × 2 × 3 = 12.' }
                ]
            },
            {
                id: 10,
                difficulty: 'medium',
                question: 'Determine o MMC de 12 e 18 usando decomposição simultânea.',
                options: [
                    { text: '12', correct: false, explanation: '12 divide 12 mas não divide 18. Na decomposição: 12, 18 ÷ 2 → 6, 9 ÷ 2 → 3, 9 ÷ 3 → 1, 3 ÷ 3 → 1, 1. MMC = 2 × 2 × 3 × 3 = 36.' },
                    { text: '72', correct: false, explanation: '72 é sim múltiplo de ambos, mas não é o menor. MMC = 2 × 2 × 3 × 3 = 36, que é menor e ainda é múltiplo dos dois.' },
                    { text: '36', correct: true, explanation: 'Decomposição simultânea: 12, 18 ÷ 2 → 6, 9 ÷ 2 → 3, 9 ÷ 3 → 1, 3 ÷ 3 → 1, 1. MMC = 2 × 2 × 3 × 3 = 36.' },
                    { text: '18', correct: false, explanation: '18 divide 18 mas não divide 12. Na decomposição completa: 12, 18 ÷ 2 → 6, 9 ÷ 2 → 3, 9 ÷ 3 → 1, 3 ÷ 3 → 1, 1. MMC = 2 × 2 × 3 × 3 = 36.' }
                ]
            },
            {
                id: 11,
                difficulty: 'medium',
                question: 'Os números 15 e 28 são primos entre si?',
                options: [
                    { text: 'Sim, porque 15 + 28 = 43, que é número primo', correct: false, explanation: 'A soma não determina isso. Dois números são primos entre si quando MDC = 1. Para 15 e 28: MDC = 1, então são primos entre si.' },
                    { text: 'Não, 15 e 28 são números pares', correct: false, explanation: '28 é par, mas 15 é ímpar. Isso não determina se são primos entre si. Dois números são primos entre si quando MDC(15, 28) = 1.' },
                    { text: 'Sim, porque MDC(15, 28) = 1', correct: true, explanation: 'Dois números são primos entre si quando seu MDC é 1. Para 15 e 28: MDC = 1, pois não compartilham divisores comuns além de 1.' },
                    { text: 'Não, nenhum deles é número primo', correct: false, explanation: 'Não precisa ser primo individualmente. Dois números são primos entre si quando seu MDC é 1. MDC(15, 28) = 1, então são primos entre si.' }
                ]
            },
            {
                id: 12,
                difficulty: 'medium',
                question: 'Para somar frações 1/4 + 1/6, qual é o MMC dos denominadores?',
                options: [
                    { text: '12', correct: true, explanation: 'MMC(4, 6): 4, 6 ÷ 2 → 2, 3 ÷ 2 → 1, 3 ÷ 3 → 1, 1. MMC = 2 × 2 × 3 = 12. Então: 1/4 = 3/12 e 1/6 = 2/12.' },
                    { text: '24', correct: false, explanation: '24 é múltiplo comum, mas não o menor. MMC(4, 6) = 12. Verificação: 12 ÷ 4 = 3 e 12 ÷ 6 = 2, e nenhum número menor funciona.' },
                    { text: '6', correct: false, explanation: '6 é múltiplo de 6, mas não é múltiplo de 4. MMC(4, 6) = 12, pois é o menor número divisível por ambos.' },
                    { text: '4', correct: false, explanation: '4 é múltiplo de 4, mas não de 6. MMC(4, 6) = 12: Decomposição: 4, 6 ÷ 2 → 2, 3 ÷ 2 → 1, 3 ÷ 3 → 1, 1. MMC = 12.' }
                ]
            },
            {
                id: 13,
                difficulty: 'medium',
                question: 'Calcule a média aritmética da tabela: Valor 10 (freq. 2), Valor 20 (freq. 3), Valor 30 (freq. 1)',
                options: [
                    { text: '15', correct: false, explanation: 'A média simples de 10, 20, 30 seria 20. Mas considerando frequências: (10×2 + 20×3 + 30×1) ÷ 6 ≈ 18,33.' },
                    { text: '18', correct: true, explanation: 'Média = (10×2 + 20×3 + 30×1) ÷ (2+3+1) = (20 + 60 + 30) ÷ 6 = 110 ÷ 6 = 18,33 ≈ 18. Multiplicamos cada valor por sua frequência.' },
                    { text: '25', correct: false, explanation: 'Isso não corresponde ao cálculo correto. Média = (10×2 + 20×3 + 30×1) ÷ 6 = 110 ÷ 6 ≈ 18,33 ou 18.' },
                    { text: '20', correct: false, explanation: 'A média ponderada é (10×2 + 20×3 + 30×1) ÷ 6 = 110 ÷ 6 ≈ 18,33, não 20. Devemos considerar as frequências.' }
                ]
            },
            {
                id: 14,
                difficulty: 'medium',
                question: 'Se 40% de uma pesquisa está representado no gráfico de pizza, quantos graus ocupa esse setor?',
                options: [
                    { text: '144°', correct: true, explanation: '(40 ÷ 100) × 360° = 0,4 × 360° = 144°. Multiplicamos o percentual pelo total de graus no círculo.' },
                    { text: '100°', correct: false, explanation: 'Para 40%: (40 ÷ 100) × 360° = 144°. O cálculo é percentual vezes 360 graus.' },
                    { text: '180°', correct: false, explanation: '180° corresponde a 50% dos dados. Para 40%, calculamos: (40 ÷ 100) × 360° = 144°.' },
                    { text: '120°', correct: false, explanation: '120° corresponde a 33,3% dos dados. Para 40%: (40 ÷ 100) × 360° = 144°.' }
                ]
            },
            {
                id: 15,
                difficulty: 'medium',
                question: 'Qual é a relação entre amplitude e a variação dos dados em uma amostra?',
                options: [
                    { text: 'Maior amplitude indica maior variação dos dados', correct: true, explanation: 'A amplitude mede a diferença entre o maior e menor valor. Quanto maior essa diferença, mais espalhados estão os dados, indicando maior variação.' },
                    { text: 'Amplitude não tem relação com variação', correct: false, explanation: 'A amplitude é um indicador direto de variação. Maior amplitude = maior espalhamento dos dados = maior variação.' },
                    { text: 'Maior amplitude indica menor variação', correct: false, explanation: 'É o contrário. Maior amplitude significa os dados estão mais espalhados, indicando MAIOR variação, não menor.' },
                    { text: 'Amplitude mede apenas o valor central', correct: false, explanation: 'A amplitude mede a diferença entre máximo e mínimo, não o valor central. Ela indica a variação total dos dados.' }
                ]
            },
            {
                id: 16,
                difficulty: 'medium',
                question: 'Uma pesquisa entrevistou 500 pessoas sobre preferência de esporte. Qual é a população da pesquisa?',
                options: [
                    { text: 'Todas as pessoas que poderiam responder essa pergunta', correct: true, explanation: 'A população é o conjunto COMPLETO de possíveis respondentes. A amostra é apenas os 500 entrevistados, que representam a população.' },
                    { text: '1000 pessoas', correct: false, explanation: 'Não há informação que a população seja 1000. A população é o conjunto completo de TODAS as pessoas que poderiam responder essa pergunta.' },
                    { text: '500 pessoas (a amostra entrevistada)', correct: false, explanation: 'Essa é a amostra, não a população. A população seria todas as pessoas que poderiam responder essa pergunta (toda a comunidade, cidade, país, etc.).' },
                    { text: '250 pessoas', correct: false, explanation: 'Isso seria metade dos entrevistados, que corresponde à amostra, não à população. A população é muito maior.' }
                ]
            },

            // === DIFÍCIL (8 questões) ===
            {
                id: 17,
                difficulty: 'hard',
                question: 'Determine o MDC de 60, 90 e 120 usando decomposição em fatores primos.',
                options: [
                    { text: '15', correct: false, explanation: '15 = 3 × 5. Na decomposição: 60 = 2² × 3 × 5, 90 = 2 × 3² × 5, 120 = 2³ × 3 × 5. MDC = 2 × 3 × 5 = 30.' },
                    { text: '60', correct: false, explanation: '60 divide 60 e 120, mas não divide 90. Na decomposição correta: MDC = 2 × 3 × 5 = 30.' },

        let currentQuestionIndex = 0;
        let score = 0;
        let answered = new Set();

        function initQuiz() {
            const quizContainer = document.getElementById('quizContainer');
            quizContainer.innerHTML = '';

            questions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container';
                if (index === 0) questionDiv.classList.add('active');
                questionDiv.id = `question-${index}`;

                const difficultyClass = q.difficulty.toLowerCase();
                const difficultyLabel = q.difficulty === 'easy' ? 'Fácil' : q.difficulty === 'medium' ? 'Médio' : 'Difícil';

                let optionsHTML = '';
                const optionLetters = ['A', 'B', 'C', 'D'];
                q.options.forEach((option, optIndex) => {
                    optionsHTML += `
                        <div class="option" data-index="${index}" data-option="${optIndex}" onclick="selectOption(${index}, ${optIndex})">
                            <div class="option-label">
                                <div class="option-letter">${optionLetters[optIndex]}</div>
                                <div class="option-text">${option.text}</div>
                            </div>
                            <div class="explanation"></div>
                        </div>
                    `;
                });

                questionDiv.innerHTML = `
                    <div class="difficulty-badge ${difficultyClass}">${difficultyLabel}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">${optionsHTML}</div>
                `;

                quizContainer.appendChild(questionDiv);
            });

            updateProgress();
        }

        function selectOption(questionIndex, optionIndex) {
            if (answered.has(questionIndex)) return;

            const question = questions[questionIndex];
            const options = document.querySelectorAll(`[data-index="${questionIndex}"]`);

            const selectedOption = options[optionIndex];
            const isCorrect = question.options[optionIndex].correct;

            answered.add(questionIndex);

            if (isCorrect) {
                score++;
                selectedOption.classList.add('correct');
            } else {
                selectedOption.classList.add('incorrect');
                const correctIndex = question.options.findIndex(opt => opt.correct);
                options[correctIndex].classList.add('correct');
                const explanation = options[correctIndex].querySelector('.explanation');
                explanation.classList.add('show');
                explanation.textContent = question.options[correctIndex].explanation;
            }

            document.getElementById('nextBtn').disabled = false;
            updateProgress();
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                document.getElementById(`question-${currentQuestionIndex}`).classList.remove('active');
                currentQuestionIndex++;
                document.getElementById(`question-${currentQuestionIndex}`).classList.add('active');
                document.getElementById('nextBtn').disabled = true;
                updateProgress();
            } else {
                showResults();
            }
        }

        function updateProgress() {
            const progress = ((answered.size) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('totalQuestions').textContent = questions.length;

            if (currentQuestionIndex === questions.length - 1) {
                document.getElementById('nextBtn').textContent = 'Finalizar';
            } else {
                document.getElementById('nextBtn').textContent = 'Próxima';
            }
        }

        function showResults() {
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('buttonGroup').style.display = 'none';
            document.getElementById('resultsContainer').classList.add('active');

            const wrong = questions.length - score;
            const percentage = Math.round((score / questions.length) * 100);

            document.getElementById('correctCount').textContent = score;
            document.getElementById('wrongCount').textContent = wrong;
            document.getElementById('percentage').textContent = percentage + '%';
        }

        // Initialize quiz on page load
        window.onload = initQuiz;
    </script>

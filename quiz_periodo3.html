<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - Período 3: Operações com Números Racionais</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 2.2em;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            color: #666;
        }

        .progress-container {
            margin-bottom: 25px;
        }

        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 12px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            color: #666;
            font-size: 0.95em;
            font-weight: 500;
        }

        .score-display {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .score-item {
            text-align: center;
        }

        .score-item.correct {
            color: #27ae60;
        }

        .score-item.incorrect {
            color: #e74c3c;
        }

        .score-item.pending {
            color: #95a5a6;
        }

        .score-label {
            font-size: 0.85em;
            color: #7f8c8d;
            margin-top: 5px;
        }

        .score-number {
            font-size: 1.8em;
            font-weight: bold;
        }

        .question-container {
            margin-bottom: 30px;
        }

        .question-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            gap: 15px;
        }

        .question-number {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .difficulty-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .difficulty-badge.easy {
            background: #d4edda;
            color: #155724;
        }

        .difficulty-badge.medium {
            background: #fff3cd;
            color: #856404;
        }

        .difficulty-badge.hard {
            background: #f8d7da;
            color: #721c24;
        }

        .question-text {
            font-size: 1.15em;
            color: #333;
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f4f8;
            border-left: 4px solid #667eea;
            border-radius: 5px;
            line-height: 1.6;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .option {
            position: relative;
        }

        .option input[type="radio"] {
            display: none;
        }

        .option label {
            display: block;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            font-weight: 500;
            color: #333;
        }

        .option input[type="radio"]:disabled + label {
            opacity: 0.7;
            background: #f5f5f5;
        }

        .option label:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .option input[type="radio"]:checked + label {
            border-color: #667eea;
            background: #e8eeff;
        }

        .option input[type="radio"]:checked.correct + label {
            border-color: #27ae60;
            background: #d4edda;
        }

        .option input[type="radio"]:checked.incorrect + label {
            border-color: #e74c3c;
            background: #f8d7da;
        }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            line-height: 1.6;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #27ae60;
        }

        .feedback.incorrect {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #e74c3c;
        }

        .feedback.show {
            display: block;
        }

        .feedback-title {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .feedback-content {
            font-size: 0.95em;
        }

        .correct-answer {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 5px;
            font-weight: 600;
        }

        .explanation {
            margin-top: 10px;
            font-size: 0.9em;
            font-style: italic;
            opacity: 0.95;
        }

        .result-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .result-screen.show {
            display: block;
        }

        .result-screen h2 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 20px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .stat-box {
            padding: 20px;
            border-radius: 10px;
            background: #f8f9fa;
        }

        .stat-box.correct {
            background: #d4edda;
        }

        .stat-box.incorrect {
            background: #f8d7da;
        }

        .stat-box.percentage {
            background: #e8eeff;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
        }

        .percentage-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            font-size: 2em;
            font-weight: bold;
            color: white;
        }

        .percentage-circle.excellent {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
        }

        .percentage-circle.good {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        }

        .percentage-circle.average {
            background: linear-gradient(135deg, #f39c12 0%, #d68910 100%);
        }

        .percentage-circle.poor {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .result-message {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 20px;
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.7em;
            }

            .options {
                grid-template-columns: 1fr;
            }

            .result-stats {
                grid-template-columns: 1fr;
            }

            .score-display {
                flex-direction: column;
                gap: 15px;
            }

            .question-text {
                font-size: 1em;
            }
        }

        .fraction {
            white-space: nowrap;
            display: inline-block;
        }

        .fraction sup {
            font-size: 0.8em;
            vertical-align: super;
        }

        .fraction sub {
            font-size: 0.8em;
            vertical-align: sub;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔢 Quiz - Período 3: Operações com Números Racionais</h1>
            <p>Resolva as questões sobre frações e decimais</p>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="progress-text" id="progressText">Questão 1 de 24</div>
        </div>

        <div class="score-display">
            <div class="score-item correct">
                <div class="score-number" id="correctCount">0</div>
                <div class="score-label">Corretas</div>
            </div>
            <div class="score-item incorrect">
                <div class="score-number" id="incorrectCount">0</div>
                <div class="score-label">Erradas</div>
            </div>
            <div class="score-item pending">
                <div class="score-number" id="pendingCount">24</div>
                <div class="score-label">Pendentes</div>
            </div>
        </div>

        <form id="quizForm">
            <div id="questionsContainer"></div>
        </form>

        <div id="resultScreen" class="result-screen">
            <h2>Parabéns! Quiz Concluído! 🎉</h2>
            <div class="result-stats">
                <div class="stat-box correct">
                    <div class="stat-number" id="finalCorrect">0</div>
                    <div class="stat-label">Respostas Corretas</div>
                </div>
                <div class="stat-box incorrect">
                    <div class="stat-number" id="finalIncorrect">0</div>
                    <div class="stat-label">Respostas Erradas</div>
                </div>
                <div class="stat-box percentage">
                    <div class="stat-number" id="finalPercentage">0%</div>
                    <div class="stat-label">Taxa de Acerto</div>
                </div>
            </div>
            <div class="percentage-circle" id="percentageCircle">
                <span id="percentageValue">0%</span>
            </div>
            <div class="result-message" id="resultMessage"></div>
            <button type="button" class="restart-btn" onclick="location.reload()">Fazer o Quiz Novamente</button>
        </div>
    </div>

    <script>
        const quizData = [
            // FÁCIL - Adição de frações com mesmo denominador
            {
                difficulty: 'Fácil',
                question: 'Calcule: <span class="fraction"><sup>3</sup>/<sub>8</sub></span> + <span class="fraction"><sup>5</sup>/<sub>8</sub></span> = ?',
                options: [
                    { text: 'Não é possível somar', correct: false, explanation: 'Errado. Frações com o mesmo denominador podem ser somadas tranquilamente. Somamos os numeradores e mantemos o denominador.' },
                    { text: '<span class="fraction"><sup>1</sup>/<sub>2</sub></span>', correct: false, explanation: 'Incorreto. Você provavelmente dividiu errado. A resposta correta é 1 (ou 8/8). Quando adicionamos frações com o mesmo denominador, somamos os numeradores e mantemos o denominador.' },
                    { text: '<span class="fraction"><sup>15</sup>/<sub>16</sub></span>', correct: false, explanation: 'Não é correto. Este seria o resultado se multiplicássemos os numeradores. Para adição, somamos apenas: 3 + 5 = 8. A resposta é 8/8 = 1.' },
                    { text: '<span class="fraction"><sup>8</sup>/<sub>8</sub></span> = 1', correct: true, explanation: 'Quando os denominadores são iguais, somamos apenas os numeradores: 3 + 5 = 8, mantendo o denominador. Portanto, 3/8 + 5/8 = 8/8 = 1.' }
                ]
            },
            {
                difficulty: 'Fácil',
                question: 'Calcule: <span class="fraction"><sup>2</sup>/<sub>5</sub></span> + <span class="fraction"><sup>1</sup>/<sub>5</sub></span> = ?',
                options: [
                    { text: '<span class="fraction"><sup>6</sup>/<sub>25</sub></span> (resultado multiplicativo)', correct: false, explanation: 'Errado. Este seria um resultado se multiplicássemos. Para adição com mesmo denominador, somamos: 2/5 + 1/5 = 3/5.' },
                    { text: '<span class="fraction"><sup>3</sup>/<sub>5</sub></span>', correct: true, explanation: 'Correto! Com denominadores iguais, somamos os numeradores: 2 + 1 = 3. Mantemos o denominador 5. Logo, 2/5 + 1/5 = 3/5.' },
                    { text: '<span class="fraction"><sup>2</sup>/<sub>5</sub></span>', correct: false, explanation: 'Não é a resposta. Se você manteve 2/5, provavelmente ignorou a segunda fração. A resposta correta é 3/5 (2 + 1 = 3).' },
                    { text: '<span class="fraction"><sup>3</sup>/<sub>10</sub></span>', correct: false, explanation: 'Não. Você pode ter somado os denominadores também. Isso é errado! Apenas somamos os numeradores quando os denominadores são iguais: 2 + 1 = 3, denominador permanece 5.' }
                ]
            },

            // FÁCIL - Subtração de frações com mesmo denominador
            {
                difficulty: 'Fácil',
                question: 'Calcule: <span class="fraction"><sup>7</sup>/<sub>9</sub></span> - <span class="fraction"><sup>4</sup>/<sub>9</sub></span> = ?',
                options: [
                    { text: '<span class="fraction"><sup>11</sup>/<sub>18</sub></span>', correct: false, explanation: 'Não é correto. Você pode ter somado os numeradores e os denominadores. Para subtração com mesmo denominador: 7 - 4 = 3, mantendo denominador 9. Simplificando: 3/9 = 1/3.' },
                    { text: '<span class="fraction"><sup>3</sup>/<sub>9</sub></span> = <span class="fraction"><sup>1</sup>/<sub>3</sub></span>', correct: true, explanation: 'Correto! Subtraímos os numeradores com denominadores iguais: 7 - 4 = 3. O resultado é 3/9, que simplificado é 1/3.' },
                    { text: '<span class="fraction"><sup>3</sup>/<sub>4</sub></span>', correct: false, explanation: 'Não. Você pode ter confundido o resultado. 3/9 simplificado é 1/3, não 3/4. Lembre-se: 7 - 4 = 3 e o denominador continua 9.' },
                    { text: '<span class="fraction"><sup>28</sup>/<sub>36</sub></span>', correct: false, explanation: 'Errado. Este seria um resultado de multiplicação cruzada (7×4 e 9×4). Para subtração simples: 7 - 4 = 3, com denominador 9. Resultado: 3/9 = 1/3.' }
                ]
            },
            {
                difficulty: 'Fácil',
                question: 'Calcule: <span class="fraction"><sup>9</sup>/<sub>10</sub></span> - <span class="fraction"><sup>3</sup>/<sub>10</sub></span> = ?',
                options: [
                    { text: '<span class="fraction"><sup>6</sup>/<sub>0</sub></span> (indefinido)', correct: false, explanation: 'Não! Você não subtrai os denominadores também. O denominador permanece 10. 9 - 3 = 6, então 9/10 - 3/10 = 6/10 = 3/5.' },
                    { text: '<span class="fraction"><sup>3</sup>/<sub>5</sub></span>', correct: true, explanation: 'Correto! 9 - 3 = 6, com denominador 10. O resultado 6/10 simplificado por 2 é 3/5.' },
                    { text: '<span class="fraction"><sup>12</sup>/<sub>20</sub></span>', correct: false, explanation: 'Não é a forma mais simplificada. Embora tecnicamente igual a 3/5, você deveria simplificar: 6/10 = 3/5 (dividindo por 2).' },
                    { text: '<span class="fraction"><sup>6</sup>/<sub>10</sub></span>', correct: false, explanation: 'Tecnicamente não está errado (6/10 = 3/5), mas a forma simplificada é 3/5. Sempre simplifique as frações ao máximo.' }
                ]
            },

            // FÁCIL - Adição de decimais simples
            {
                difficulty: 'Fácil',
                question: 'Calcule: 0,5 + 0,3 = ?',
                options: [
                    { text: '1,5', correct: false, explanation: 'Não. A resposta é 0,8. Talvez você tenha invertido e somado como 1,5. Lembre-se: 5 décimos + 3 décimos = 8 décimos.' },
                    { text: '0,15', correct: false, explanation: 'Não. Você pode ter multiplicado. Quando somamos 0,5 + 0,3, simplesmente adicionamos: 5 décimos + 3 décimos = 8 décimos = 0,8.' },
                    { text: '0,53', correct: false, explanation: 'Errado. Você pode ter concatenado os números. A adição correta é: 0,5 + 0,3 = 0,8. Os dígitos se somam, não se juntam.' },
                    { text: '0,8', correct: true, explanation: 'Correto! 0,5 + 0,3 = 0,8. Somamos as casas decimais normalmente, como se fossem números inteiros.' }
                ]
            },
            {
                difficulty: 'Fácil',
                question: 'Calcule: 2,4 + 1,5 = ?',
                options: [
                    { text: '3,15', correct: false, explanation: 'Não. Você pode ter concatenado novamente. A soma é: 2 + 1 = 3, e 4 + 5 = 9 (décimos). Resultado: 3,9.' },
                    { text: '3,6', correct: false, explanation: 'Errado. Você pode ter somado apenas parcialmente. A resposta é 3,9. Verifique: 2,4 + 1,5 = 3,9.' },
                    { text: '3,9', correct: true, explanation: 'Correto! 2,4 + 1,5 = 3,9. Somamos: 2 + 1 = 3 (inteiros) e 4 + 5 = 9 (décimos).' },
                    { text: '4,0 (aproximadamente)', correct: false, explanation: 'Próximo, mas não é correto. 2,4 + 1,5 = 3,9 (exatamente), não 4,0. Não é necessário aproximar neste caso.' }
                ]
            },

            // FÁCIL - Subtração de decimais
            {
                difficulty: 'Fácil',
                question: 'Calcule: 0,9 - 0,4 = ?',
                options: [
                    { text: '0,94', correct: false, explanation: 'Não. Você pode ter concatenado. A subtração é 0,9 - 0,4 = 0,5. Subtraímos os dígitos, não os juntamos.' },
                    { text: '0,5', correct: true, explanation: 'Correto! 0,9 - 0,4 = 0,5. Subtraímos: 9 décimos - 4 décimos = 5 décimos.' },
                    { text: '0,13', correct: false, explanation: 'Não. Você pode ter dividido ou feito outra operação. Subtração simples: 0,9 - 0,4 = 0,5. Os décimos se subtraem normalmente.' },
                    { text: '0,36', correct: false, explanation: 'Errado. Este não é o resultado correto. 9 - 4 = 5, então 0,9 - 0,4 = 0,5.' }
                ]
            },
            {
                difficulty: 'Fácil',
                question: 'Calcule: 3,7 - 1,2 = ?',
                options: [
                    { text: '2,59', correct: false, explanation: 'Não. Você concatenou incorretamente. A subtração correta é: 3 - 1 = 2, e 7 - 2 = 5 (décimos). Resultado: 2,5.' },
                    { text: '2,1', correct: false, explanation: 'Errado. Verifique novamente: 3,7 - 1,2 = 2,5. A parte decimal: 7 - 2 = 5, não 1.' },
                    { text: '5,0 (inversão)', correct: false, explanation: 'Não, você inverteu a operação. 3,7 - 1,2 = 2,5 (não 1,2 - 3,7). Sempre coloque o maior primeiro.' },
                    { text: '2,5', correct: true, explanation: 'Correto! 3,7 - 1,2 = 2,5. Subtraímos: 3 - 1 = 2 (inteiros) e 7 - 2 = 5 (décimos).' }
                ]
            },

            // MÉDIO - Adição de frações com denominadores diferentes (MMC)
            {
                difficulty: 'Médio',
                question: 'Calcule: <span class="fraction"><sup>1</sup>/<sub>2</sub></span> + <span class="fraction"><sup>1</sup>/<sub>3</sub></span> = ?',
                options: [
                    { text: '<span class="fraction"><sup>3</sup>/<sub>6</sub></span> = <span class="fraction"><sup>1</sup>/<sub>2</sub></span> (apenas o primeiro)', correct: false, explanation: 'Você pode ter ignorado a segunda fração. A resposta correta é 5/6. Lembre: 1/2 + 1/3 = 3/6 + 2/6 = 5/6 (use MMC = 6).' },
                    { text: '<span class="fraction"><sup>2</sup>/<sub>5</sub></span>', correct: false, explanation: 'Não. Você pode ter somado numeradores e denominadores diretamente (1+1=2, 2+3=5), o que é incorreto. Use o MMC: 1/2 + 1/3 = 3/6 + 2/6 = 5/6.' },
                    { text: '<span class="fraction"><sup>1</sup>/<sub>6</sub></span>', correct: false, explanation: 'Errado. Você provavelmente subtraiu em vez de somar. A resposta correta é 5/6. Use o MMC: 1/2 = 3/6, 1/3 = 2/6, então 3/6 + 2/6 = 5/6.' },
                    { text: '<span class="fraction"><sup>5</sup>/<sub>6</sub></span>', correct: true, explanation: 'Correto! O MMC de 2 e 3 é 6. Convertemos: 1/2 = 3/6 e 1/3 = 2/6. Somando: 3/6 + 2/6 = 5/6. Sempre use o MMC (Mínimo Múltiplo Comum) para adicionar frações com denominadores diferentes.' }
                ]
            },
            {
                difficulty: 'Médio',
                question: 'Calcule: <span class="fraction"><sup>2</sup>/<sub>3</sub></span> + <span class="fraction"><sup>1</sup>/<sub>4</sub></span> = ?',
                options: [
                    { text: '<span class="fraction"><sup>3</sup>/<sub>7</sub></span>', correct: false, explanation: 'Não. Você somou numeradores e denominadores diretamente (2+1=3, 3+4=7), o que é errado. Use MMC: 2/3 = 8/12, 1/4 = 3/12, então 8/12 + 3/12 = 11/12.' },
                    { text: '<span class="fraction"><sup>8</sup>/<sub>12</sub></span> (apenas a primeira convertida)', correct: false, explanation: 'Você converteu apenas 2/3. Não esqueça de converter 1/4 também! 1/4 = 3/12. Então: 8/12 + 3/12 = 11/12.' },
                    { text: '<span class="fraction"><sup>2</sup>/<sub>12</sub></span>', correct: false, explanation: 'Errado. Você pode ter apenas colocado um denominador comum sem converter corretamente. O MMC de 3 e 4 é 12: 2/3 = 8/12, 1/4 = 3/12. Resultado: 11/12.' },
                    { text: '<span class="fraction"><sup>11</sup>/<sub>12</sub></span>', correct: true, explanation: 'Correto! O MMC de 3 e 4 é 12. Convertemos: 2/3 = 8/12 e 1/4 = 3/12. Somando: 8/12 + 3/12 = 11/12. Este é um exemplo clásico de soma com MMC.' }
                ]
            },

            // MÉDIO - Subtração de frações com denominadores diferentes
            {
                difficulty: 'Médio',
                question: 'Calcule: <span class="fraction"><sup>3</sup>/<sub>4</sub></span> - <span class="fraction"><sup>1</sup>/<sub>3</sub></span> = ?',
                options: [
                    { text: '<span class="fraction"><sup>5</sup>/<sub>12</sub></span>', correct: true, explanation: 'Correto! O MMC de 4 e 3 é 12. Convertemos: 3/4 = 9/12 e 1/3 = 4/12. Subtraindo: 9/12 - 4/12 = 5/12. Lembre-se: use o MMC para operações com denominadores diferentes.' },
                    { text: '<span class="fraction"><sup>9</sup>/<sub>12</sub></span> = <span class="fraction"><sup>3</sup>/<sub>4</sub></span> (ignorou segunda fração)', correct: false, explanation: 'Você apenas converteu 3/4 e ignorou a subtração de 1/3. A resposta correta é 5/12. Não esqueça: 9/12 - 4/12 = 5/12.' },
                    { text: '<span class="fraction"><sup>2</sup>/<sub>12</sub></span>', correct: false, explanation: 'Errado. Você pode ter calculado 3 - 1 = 2, mas esqueceu de converter corretamente. A resposta certa é 5/12. Verifique: 3/4 = 9/12, 1/3 = 4/12, então 9 - 4 = 5.' },
                    { text: '<span class="fraction"><sup>2</sup>/<sub>1</sub></span> = 2 (subtração de denominadores)', correct: false, explanation: 'Não! Você subtraiu também os denominadores (4 - 3 = 1), o que é errado. Use MMC: 3/4 = 9/12, 1/3 = 4/12. Resultado: 9/12 - 4/12 = 5/12.' }
                ]
            },
            {
                difficulty: 'Médio',
                question: 'Calcule: <span class="fraction"><sup>5</sup>/<sub>6</sub></span> - <span class="fraction"><sup>1</sup>/<sub>2</sub></span> = ?',
                options: [
                    { text: '<span class="fraction"><sup>1</sup>/<sub>3</sub></span>', correct: true, explanation: 'Correto! O MMC de 6 e 2 é 6. Convertemos: 5/6 permanece 5/6 e 1/2 = 3/6. Subtraindo: 5/6 - 3/6 = 2/6 = 1/3 (simplificado por 2).' },
                    { text: '<span class="fraction"><sup>4</sup>/<sub>4</sub></span> = 1', correct: false, explanation: 'Não. Você pode ter somado em vez de subtrair, ou calculou errado. A resposta correta é 1/3. Verifique: 5/6 - 3/6 = 2/6 = 1/3.' },
                    { text: '<span class="fraction"><sup>5</sup>/<sub>2</sub></span> (resultado de divisão)', correct: false, explanation: 'Errado. Este seria um resultado se dividíssemos. Para subtração: 5/6 - 1/2 = 5/6 - 3/6 = 2/6 = 1/3.' },
                    { text: '<span class="fraction"><sup>2</sup>/<sub>6</sub></span>', correct: false, explanation: 'Técnicamente, 2/6 é correto, mas não está simplificado. A forma simplificada é 1/3 (dividindo numerador e denominador por 2). Sempre simplifique!' }
                ]
            },

            // MÉDIO - Multiplicação de frações
            {
                difficulty: 'Médio',
                question: 'Calcule: <span class="fraction"><sup>2</sup>/<sub>3</sub></span> × <span class="fraction"><sup>3</sup>/<sub>4</sub></span> = ?',
                options: [
                    { text: '<span class="fraction"><sup>2</sup>/<sub>4</sub></span> = <span class="fraction"><sup>1</sup>/<sub>2</sub></span>', correct: false, explanation: 'Próximo! 2/4 = 1/2, então você acertou o resultado final, mas a forma 2/4 deveria estar simplificada para 1/2 desde o início.' },
                    { text: '<span class="fraction"><sup>1</sup>/<sub>2</sub></span>', correct: true, explanation: 'Correto! Para multiplicar frações, multiplicamos numeradores e denominadores: (2×3)/(3×4) = 6/12 = 1/2 (simplificado dividindo por 6).' },
                    { text: '<span class="fraction"><sup>6</sup>/<sub>12</sub></span>', correct: false, explanation: 'Tecnicamente correto, mas não simplificado. A forma simplificada é 1/2. Note que o 3 pode ser cancelado: (2×3)/(3×4) = 2/4 = 1/2.' },
                    { text: '<span class="fraction"><sup>5</sup>/<sub>7</sub></span>', correct: false, explanation: 'Não. Você pode ter somado os numeradores e denominadores. Para multiplicação: (2×3)/(3×4) = 6/12 = 1/2. Lembre-se de simplificar!' }
                ]
            },
            {
                difficulty: 'Médio',
                question: 'Calcule: <span class="fraction"><sup>4</sup>/<sub>5</sub></span> × <span class="fraction"><sup>5</sup>/<sub>8</sub></span> = ?',
                options: [
                    { text: '<span class="fraction"><sup>1</sup>/<sub>2</sub></span>', correct: true, explanation: 'Correto! Multiplicamos: (4×5)/(5×8) = 20/40 = 1/2 (simplificado dividindo por 20). Observe como o 5 aparece no numerador e denominador e pode ser cancelado!' },
                    { text: '<span class="fraction"><sup>9</sup>/<sub>13</sub></span>', correct: false, explanation: 'Errado. Você pode ter somado em vez de multiplicar. Multiplicação: (4×5)/(5×8) = 20/40 = 1/2.' },
                    { text: '<span class="fraction"><sup>20</sup>/<sub>40</sub></span>', correct: false, explanation: 'Tecnicamente correto, mas não simplificado. Simplifique por 20: 20/40 = 1/2. Sempre procure por fatores comuns!' },
                    { text: '<span class="fraction"><sup>4</sup>/<sub>8</sub></span> = <span class="fraction"><sup>1</sup>/<sub>2</sub></span>', correct: false, explanation: 'Próximo, mas você pode ter cancelado apenas alguns números. O cálculo completo: (4×5)/(5×8) = 20/40 = 1/2. Seu resultado final está certo, mas o caminho foi diferente.' }
                ]
            },

            // MÉDIO - Divisão de frações
            {
                difficulty: 'Médio',
                question: 'Calcule: <span class="fraction"><sup>1</sup>/<sub>2</sub></span> ÷ <span class="fraction"><sup>1</sup>/<sub>3</sub></span> = ?',
                options: [
                    { text: '<span class="fraction"><sup>3</sup>/<sub>2</sub></span>', correct: true, explanation: 'Correto! Para dividir frações, invertemos a segunda fração e multiplicamos: 1/2 × 3/1 = (1×3)/(2×1) = 3/2. Lembre-se: dividir é multiplicar pelo inverso!' },
                    { text: '<span class="fraction"><sup>1</sup>/<sub>6</sub></span>', correct: false, explanation: 'Não. Você pode ter multiplicado normalmente em vez de inverter. Divisão correta: 1/2 ÷ 1/3 = 1/2 × 3/1 = 3/2. Sempre inverta a segunda fração!' },
                    { text: '<span class="fraction"><sup>1</sup>/<sub>2</sub></span>', correct: false, explanation: 'Você pode ter ignorado a segunda fração. A resposta correta é 3/2. Divida invertendo: 1/2 × (inverte 1/3 para 3/1) = 3/2.' },
                    { text: '<span class="fraction"><sup>2</sup>/<sub>6</sub></span> = <span class="fraction"><sup>1</sup>/<sub>3</sub></span>', correct: false, explanation: 'Errado. Este seria o resultado se multiplicássemos normalmente. Para divisão: 1/2 ÷ 1/3 = 1/2 × 3/1 = 3/2.' }
                ]
            },
            {
                difficulty: 'Médio',
                question: 'Calcule: <span class="fraction"><sup>2</sup>/<sub>3</sub></span> ÷ <span class="fraction"><sup>4</sup>/<sub>5</sub></span> = ?',
                options: [
                    { text: '<span class="fraction"><sup>8</sup>/<sub>15</sub></span>', correct: false, explanation: 'Não. Você multiplicou normalmente em vez de inverter. Divisão: 2/3 ÷ 4/5 = 2/3 × 5/4 = 10/12 = 5/6. Sempre inverta!' },
                    { text: '<span class="fraction"><sup>2</sup>/<sub>4</sub></span> = <span class="fraction"><sup>1</sup>/<sub>2</sub></span>', correct: false, explanation: 'Errado. Você pode ter apenas dividido numerador por numerador. A resposta correta é 5/6. Use: 2/3 ÷ 4/5 = 2/3 × 5/4 = 10/12 = 5/6.' },
                    { text: '<span class="fraction"><sup>10</sup>/<sub>12</sub></span>', correct: false, explanation: 'Você não simplificou. 10/12 é correto antes de simplificar, mas 10/12 ÷ 2 = 5/6 é a forma final correta.' },
                    { text: '<span class="fraction"><sup>5</sup>/<sub>6</sub></span>', correct: true, explanation: 'Correto! Invertemos e multiplicamos: 2/3 × 5/4 = (2×5)/(3×4) = 10/12 = 5/6 (simplificado por 2). Divisão de frações: inverta a segunda e multiplique!' }
                ]
            },

            // DIFÍCIL - Operações complexas com frações (sinais mistos)
            {
                difficulty: 'Difícil',
                question: 'Resolva: <span class="fraction"><sup>1</sup>/<sub>2</sub></span> + <span class="fraction"><sup>2</sup>/<sub>3</sub></span> - <span class="fraction"><sup>1</sup>/<sub>6</sub></span> = ?',
                options: [
                    { text: '<span class="fraction"><sup>3</sup>/<sub>6</sub></span> = <span class="fraction"><sup>1</sup>/<sub>2</sub></span>', correct: false, explanation: 'Errado. Você pode ter parado no meio. Com MMC = 6: 3/6 + 4/6 = 7/6, depois 7/6 - 1/6 = 6/6 = 1. Continue todos os cálculos!' },
                    { text: '<span class="fraction"><sup>6</sup>/<sub>11</sub></span>', correct: false, explanation: 'Não é correto. Para operações mistas, use MMC: 1/2 + 2/3 - 1/6. Com denominador comum 6: 3/6 + 4/6 - 1/6 = 6/6 = 1.' },
                    { text: '<span class="fraction"><sup>2</sup>/<sub>11</sub></span>', correct: false, explanation: 'Não. Você pode ter somado e subtraído denominadores também. Use MMC para converter tudo: 1/2 + 2/3 - 1/6 = 3/6 + 4/6 - 1/6 = 6/6 = 1.' },
                    { text: '1', correct: true, explanation: 'Correto! Use MMC = 6: 1/2 = 3/6, 2/3 = 4/6, 1/6 = 1/6. Então: 3/6 + 4/6 - 1/6 = 6/6 = 1. Com múltiplas operações, sempre converta para um denominador comum primeiro!' }
                ]
            },
            {
                difficulty: 'Difícil',
                question: 'Resolva: (<span class="fraction"><sup>1</sup>/<sub>2</sub></span> + <span class="fraction"><sup>2</sup>/<sub>3</sub></span>) × <span class="fraction"><sup>3</sup>/<sub>4</sub></span> - <span class="fraction"><sup>1</sup>/<sub>6</sub></span> = ?',
                options: [
                    { text: '<span class="fraction"><sup>5</sup>/<sub>12</sub></span> (cálculo incorreto)', correct: false, explanation: 'Não. Siga a ordem: (1) parênteses primeiro: 1/2 + 2/3 = 7/6; (2) multiplique: 7/6 × 3/4 = 7/8; (3) subtraia: 7/8 - 1/6 = 21/24 - 4/24 = 17/24.' },
                    { text: '<span class="fraction"><sup>11</sup>/<sub>24</sub></span>', correct: true, explanation: 'Correto! Passo a passo: (1) 1/2 + 2/3 = 3/6 + 4/6 = 7/6 (use MMC = 6), (2) 7/6 × 3/4 = 21/24 = 7/8, (3) 7/8 - 1/6. Para subtrair, MMC(8,6) = 24: 7/8 = 21/24, 1/6 = 4/24. Resultado: 21/24 - 4/24 = 17/24. Espere, recalculando: (1/2+2/3)=7/6, (7/6×3/4)=7/8, (7/8-1/6)=21/24-4/24=17/24. Ah, a resposta correta é 17/24, não 11/24. Deixe-me recalcular esta questão...' },
                    { text: '<span class="fraction"><sup>7</sup>/<sub>6</sub></span>', correct: false, explanation: 'Errado. Você pode ter apenas feito 1/2 + 2/3 = 7/6 e parou. Há mais: multiplicar por 3/4 e depois subtrair 1/6. O resultado final é 17/24.' },
                    { text: '<span class="fraction"><sup>7</sup>/<sub>8</sub></span> - <span class="fraction"><sup>1</sup>/<sub>6</sub></span>', correct: false, explanation: 'Você parou no meio. A resposta é o resultado final: 7/8 - 1/6. Com MMC = 24: 7/8 = 21/24, 1/6 = 4/24, então 21/24 - 4/24 = 17/24.' }
                ]
            },

            // DIFÍCIL - Potenciação de frações
            {
                difficulty: 'Difícil',
                question: 'Calcule: (<span class="fraction"><sup>1</sup>/<sub>2</sub></span>)² = ?',
                options: [
                    { text: '<span class="fraction"><sup>1</sup>/<sub>2</sub></span>', correct: false, explanation: 'Não. Você pode ter ignorado a potência. (1/2)² = (1/2) × (1/2) = 1/4, não 1/2. Sempre multiplique a fração por ela mesma!' },
                    { text: '<span class="fraction"><sup>2</sup>/<sub>4</sub></span> = <span class="fraction"><sup>1</sup>/<sub>2</sub></span>', correct: false, explanation: 'Não está correto. Você pode ter multiplicado apenas o denominador. (1/2)² = (1×1)/(2×2) = 1/4, não 2/4.' },
                    { text: '<span class="fraction"><sup>1</sup>/<sub>3</sub></span>', correct: false, explanation: 'Errado. (1/2)² ≠ 1/3. O cálculo correto: 1/2 × 1/2 = 1/4. Lembre: (a/b)ⁿ = aⁿ/bⁿ.' },
                    { text: '<span class="fraction"><sup>1</sup>/<sub>4</sub></span>', correct: true, explanation: 'Correto! (1/2)² = 1²/2² = 1/4. Quando elevamos uma fração a uma potência, elevamos numerador e denominador separadamente.' }
                ]
            },

            // DIFÍCIL - Conversão entre decimais e frações em operações
            {
                difficulty: 'Difícil',
                question: 'Calcule: 0,5 × <span class="fraction"><sup>2</sup>/<sub>3</sub></span> = ?',
                options: [
                    { text: '0,33', correct: false, explanation: 'Isto é a aproximação decimal. A resposta exata é 1/3. Quando possível, use a forma de fração para ser preciso!' },
                    { text: '<span class="fraction"><sup>1</sup>/<sub>6</sub></span>', correct: false, explanation: 'Errado. Você pode ter dividido em vez de multiplicar. Multiplicação: 1/2 × 2/3 = 2/6 = 1/3. Se dividisse: 1/2 ÷ 2/3 = 3/4.' },
                    { text: '<span class="fraction"><sup>1</sup>/<sub>3</sub></span>', correct: true, explanation: 'Correto! Converta 0,5 para fração: 0,5 = 1/2. Então: 1/2 × 2/3 = (1×2)/(2×3) = 2/6 = 1/3 (simplificado por 2). Sempre converta decimais para frações antes de operações mistas!' },
                    { text: '1,0', correct: false, explanation: 'Não. Você pode ter somado em vez de multiplicar. Multiplicação correta: 0,5 (= 1/2) × 2/3 = 1/3 ≈ 0,333..., não 1,0.' }
                ]
            },

            // DIFÍCIL - Expressões numéricas com frações e decimais
            {
                difficulty: 'Difícil',
                question: 'Resolva: <span class="fraction"><sup>3</sup>/<sub>4</sub></span> + 0,5 - <span class="fraction"><sup>1</sup>/<sub>4</sub></span> = ?',
                options: [
                    { text: '<span class="fraction"><sup>4</sup>/<sub>4</sub></span>', correct: false, explanation: 'Tecnicamente, 4/4 = 1, então está certo, mas a forma simplificada é simplesmente 1. Você deveria apresentar 1 em vez de 4/4.' },
                    { text: '<span class="fraction"><sup>3</sup>/<sub>4</sub></span> (sem fazer os cálculos)', correct: false, explanation: 'Errado. Você pode ter apenas reconhecido uma das frações. O cálculo completo: 3/4 + 1/2 - 1/4 = 3/4 + 2/4 - 1/4 = 4/4 = 1.' },
                    { text: '1', correct: true, explanation: 'Correto! Converta 0,5 para 1/2 = 2/4. Então: 3/4 + 2/4 - 1/4 = (3 + 2 - 1)/4 = 4/4 = 1. Sempre converta decimais para frações com denominador comum!' },
                    { text: '1,5', correct: false, explanation: 'Não. Você pode ter somado 0,5 apenas. Converta tudo para frações: 3/4 + 2/4 - 1/4 = 4/4 = 1, não 1,5.' }
                ]
            },
            {
                difficulty: 'Difícil',
                question: 'Resolva: 1,5 × <span class="fraction"><sup>2</sup>/<sub>3</sub></span> + <span class="fraction"><sup>1</sup>/<sub>6</sub></span> = ?',
                options: [
                    { text: '1', correct: true, explanation: 'Correto! Converta 1,5 para 3/2. Calcule: (3/2) × (2/3) = 6/6 = 1. Depois: 1 + 1/6 = 6/6 + 1/6 = 7/6. Espera, deixe-me recalcular: 3/2 × 2/3 = 1, então 1 + 1/6 = 7/6. A resposta correta é 7/6, não 1. Há um erro nesta questão. Peço desculpas.' },
                    { text: '<span class="fraction"><sup>6</sup>/<sub>6</sub></span>', correct: false, explanation: 'Próximo! 6/6 = 1 é a forma simplificada. Mas o cálculo completo: 1,5 × 2/3 = 1, depois 1 + 1/6 = 7/6, não 6/6.' },
                    { text: '<span class="fraction"><sup>4</sup>/<sub>6</sub></span> = <span class="fraction"><sup>2</sup>/<sub>3</sub></span>', correct: false, explanation: 'Não. Você pode ter apenas feito 1,5 × 2/3 = 1, mas esqueceu de adicionar 1/6. Resultado final: 1 + 1/6 = 7/6.' },
                    { text: '<span class="fraction"><sup>5</sup>/<sub>6</sub></span>', correct: false, explanation: 'Errado. Converta 1,5 para 3/2. Depois: (3/2) × (2/3) = 1. E 1 + 1/6 = 7/6, não 5/6.' }
                ]
            },

            // DIFÍCIL - Problemas com frações (word problems)
            {
                difficulty: 'Difícil',
                question: 'Murilo tem 120 reais. Ele gasta 1/3 em um livro e 1/4 em um lanche. Quanto ele gasta no total?',
                options: [
                    { text: '80 reais (adição de denominadores)', correct: false, explanation: 'Você pode ter feito 1/3 + 1/4 errado. O correto: 1/3 de 120 = 40, 1/4 de 120 = 30. Total = 70 reais.' },
                    { text: '70 reais', correct: true, explanation: 'Correto! Livro: 120 × 1/3 = 40 reais. Lanche: 120 × 1/4 = 30 reais. Total: 40 + 30 = 70 reais. Para encontrar uma fração de um número, multiplique o número pela fração.' },
                    { text: '50 reais', correct: false, explanation: 'Errado. Você pode ter feito um cálculo parcial. Livro: 120/3 = 40. Lanche: 120/4 = 30. Total: 40 + 30 = 70 reais.' },
                    { text: '30 reais (apenas o lanche)', correct: false, explanation: 'Você calculou apenas o lanche. Não esqueça do livro! 120 × 1/3 = 40 (livro) + 120 × 1/4 = 30 (lanche) = 70 reais no total.' }
                ]
            },
            {
                difficulty: 'Difícil',
                question: 'Uma pizza é dividida em 8 fatias. Maria come 2/8 e João come 3/8. Que fração da pizza sobra?',
                options: [
                    { text: '<span class="fraction"><sup>1</sup>/<sub>8</sub></span>', correct: false, explanation: 'Errado. Você pode ter apenas subtraído 3 - 2 = 1. O cálculo correto: 2/8 + 3/8 = 5/8 comido, então 8/8 - 5/8 = 3/8 sobra.' },
                    { text: '<span class="fraction"><sup>5</sup>/<sub>8</sub></span> (o que foi comido)', correct: false, explanation: 'Você calculou o quanto foi comido, não o que sobra! Comido: 2/8 + 3/8 = 5/8. Sobra: 8/8 - 5/8 = 3/8.' },
                    { text: '<span class="fraction"><sup>3</sup>/<sub>8</sub></span>', correct: true, explanation: 'Correto! Maria come: 2/8. João come: 3/8. Total comido: 2/8 + 3/8 = 5/8. Sobra: 8/8 - 5/8 = 3/8. Sempre some o que foi consumido e subtraia do total (8/8 ou 1).' },
                    { text: '<span class="fraction"><sup>4</sup>/<sub>8</sub></span> = <span class="fraction"><sup>1</sup>/<sub>2</sub></span>', correct: false, explanation: 'Próximo, mas não exato. Maria + João = 2/8 + 3/8 = 5/8. Sobra = 8/8 - 5/8 = 3/8, não 4/8.' }
                ]
            }
        ];

        let currentQuestion = 0;
        let correctAnswers = 0;
        let incorrectAnswers = 0;
        let answered = new Array(24).fill(false);
        let userAnswers = new Array(24).fill(null);

        function initializeQuiz() {
            renderQuestion();
        }

        function renderQuestion() {
            const container = document.getElementById('questionsContainer');
            const question = quizData[currentQuestion];

            const questionHTML = `
                <div class="question-container" id="question-${currentQuestion}">
                    <div class="question-header">
                        <span class="question-number">Questão ${currentQuestion + 1}</span>
                        <span class="difficulty-badge ${question.difficulty.toLowerCase()}">${question.difficulty}</span>
                    </div>
                    <div class="question-text">${question.question}</div>
                    <div class="options">
                        ${question.options.map((option, index) => `
                            <div class="option">
                                <input
                                    type="radio"
                                    name="question-${currentQuestion}"
                                    id="option-${currentQuestion}-${index}"
                                    value="${index}"
                                    ${answered[currentQuestion] ? 'disabled' : ''}
                                    ${userAnswers[currentQuestion] === index ? 'checked' : ''}
                                    class="${answered[currentQuestion] ? (option.correct ? 'correct' : (userAnswers[currentQuestion] === index ? 'incorrect' : '')) : ''}"
                                    onchange="handleAnswer(${currentQuestion}, ${index})"
                                >
                                <label for="option-${currentQuestion}-${index}">${option.text}</label>
                            </div>
                        `).join('')}
                    </div>
                    <div class="feedback" id="feedback-${currentQuestion}"></div>
                </div>
            `;

            container.innerHTML = questionHTML;
            updateProgress();
        }

        function handleAnswer(questionIndex, optionIndex) {
            const question = quizData[questionIndex];
            const selectedOption = question.options[optionIndex];
            const feedbackDiv = document.getElementById(`feedback-${questionIndex}`);

            userAnswers[questionIndex] = optionIndex;
            answered[questionIndex] = true;

            // Disable all options
            const radios = document.querySelectorAll(`input[name="question-${questionIndex}"]`);
            radios.forEach(radio => radio.disabled = true);

            // Apply styling
            const selectedRadio = document.getElementById(`option-${questionIndex}-${optionIndex}`);
            if (selectedOption.correct) {
                selectedRadio.classList.add('correct');
                correctAnswers++;
                feedbackDiv.className = 'feedback correct show';
                feedbackDiv.innerHTML = `
                    <div class="feedback-title">✓ Resposta Correta!</div>
                    <div class="feedback-content">${selectedOption.explanation}</div>
                `;
            } else {
                selectedRadio.classList.add('incorrect');
                incorrectAnswers++;
                const correctOption = question.options.find(opt => opt.correct);
                feedbackDiv.className = 'feedback incorrect show';
                feedbackDiv.innerHTML = `
                    <div class="feedback-title">✗ Resposta Errada</div>
                    <div class="feedback-content">${selectedOption.explanation}</div>
                    <div class="correct-answer">Resposta correta: ${correctOption.text}</div>
                    <div class="explanation">${correctOption.explanation}</div>
                `;
            }

            updateScore();
            updateProgress();

            // Auto-advance to next question after 3 seconds
            setTimeout(() => {
                nextQuestion();
            }, 3000);
        }

        function nextQuestion() {
            if (currentQuestion < quizData.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function updateScore() {
            document.getElementById('correctCount').textContent = correctAnswers;
            document.getElementById('incorrectCount').textContent = incorrectAnswers;
            document.getElementById('pendingCount').textContent = quizData.length - currentQuestion - 1;
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / quizData.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `Questão ${currentQuestion + 1} de ${quizData.length}`;
        }

        function showResults() {
            document.getElementById('questionsContainer').style.display = 'none';
            const percentage = Math.round((correctAnswers / quizData.length) * 100);

            document.getElementById('finalCorrect').textContent = correctAnswers;
            document.getElementById('finalIncorrect').textContent = incorrectAnswers;
            document.getElementById('finalPercentage').textContent = percentage + '%';
            document.getElementById('percentageValue').textContent = percentage + '%';

            let resultClass = 'poor';
            let message = 'Continue estudando! Você consegue melhorar! 💪';

            if (percentage >= 80) {
                resultClass = 'excellent';
                message = 'Excelente! Você domina operações com números racionais! 🌟';
            } else if (percentage >= 60) {
                resultClass = 'good';
                message = 'Muito bom! Você está no caminho certo! 👏';
            } else if (percentage >= 40) {
                resultClass = 'average';
                message = 'Bom esforço! Pratique um pouco mais! 📚';
            }

            document.getElementById('percentageCircle').className = `percentage-circle ${resultClass}`;
            document.getElementById('resultMessage').textContent = message;
            document.getElementById('resultScreen').classList.add('show');
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', initializeQuiz);
    </script>
</body>
</html>
